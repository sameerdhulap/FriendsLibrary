name: Book availability watch

on:
  schedule:
    # Every 3 hours (UTC)
    - cron: "0 */3 * * *"
  workflow_dispatch: {} # lets you trigger a run manually from the Actions tab

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - run: npm ci

      - name: Check book availability
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: samir.dhulap@gmail.com
          BOOK_URL: ${{ vars.BOOK_URL }}
          # NOTIFY_ALWAYS: "true"   # uncomment to get an email every run, not just when available
        run: node check-book.js
